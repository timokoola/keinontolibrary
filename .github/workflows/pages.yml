name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel a live deploy).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          set -euo pipefail
          tgz="mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/${tgz}"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "$url" | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build mdBook
        run: mdbook build docs

      - name: Assemble site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R site/. _site/
          # Docs live under /guide/ (matches book.toml site-url and the landing-page links).
          mkdir -p _site/guide
          cp -R docs/book/. _site/guide/
          # src="." makes mdBook copy book.toml into the output; don't publish it.
          rm -f _site/guide/book.toml
          # Custom domain for GitHub Pages.
          echo "keinonto.com" > _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
