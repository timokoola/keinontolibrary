# Exception registry — genuinely irregular forms the rule engine does not model.
#
# Each entry overrides one (lemma, number, case) slot. The corpus lookup already serves
# these for attested words; the registry makes the rule *fallback* correct for them too,
# documents them, and lets the parity harness count them as handled.
#
# Keep this justified: it is a registry of true irregularities, not a dumping ground for
# systematic rule gaps. CI caps the number of distinct irregular *lemmas* (not rows) in
# tests/parity.rs — a genuine irregular legitimately needs many slots; many *lemmas* is the
# smell that means "fix the rule instead".
#
# Fields: lemma, number (singular|plural), case (English name), forms (primary first),
# reason. Optional: tn (to disambiguate a homonym).

# --- aika (Kotus tn 9) / poika (Kotus tn 10): k:j gradation ---------------------------
# The two classic k:j irregulars. Kotus tags both gradation D (k:∅, like vika->vian,
# reikä->reiän), but their weak grade is k:j: aika->aja-, poika->poja-. The difference is
# lexical (vian vs ajan are both "Vika"), so the rule engine — which faithfully applies D —
# produces aian/poian. We override every weak-grade slot; the strong-grade slots
# (nominative, partitive, illative, essive sg; partitive/illative/essive/comitative pl)
# are already correct from the rule.

# aika, singular weak-grade slots (aja-)
[[exception]]
lemma = "aika"
tn = 9
number = "singular"
case = "genitive"
forms = ["ajan"]
reason = "k:j gradation aika->aja- (Kotus marks D)"

[[exception]]
